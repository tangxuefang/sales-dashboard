<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>销售数据大屏</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg-primary:    #040d1f;
      --bg-panel:      #0a1f3f;
      --bg-card:       rgba(0,40,100,.8);
      --accent:        #00c8ff;
      --accent-2:      #0080ff;
      --accent-glow:   rgba(0,200,255,.3);
      --border:        rgba(0,168,255,.25);
      --text-primary:  #c8daf5;
      --text-label:    #5a8fc0;
      --text-muted:    #3a7fac;
      --gradient-hero: linear-gradient(90deg, rgba(0,60,120,.9) 0%, rgba(0,20,60,.95) 50%, rgba(0,60,120,.9) 100%);
      --shadow-glow:   0 0 20px rgba(0,168,255,.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; }
    body::before { content: ""; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,168,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,168,255,.04) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
    header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; background: var(--gradient-hero); border-bottom: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,100,255,.2); }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: 4px; background: linear-gradient(90deg, var(--accent), #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    header .update-time { font-size: 13px; color: var(--text-muted); }
    main { position: relative; z-index: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 22px; display: flex; flex-direction: column; gap: 6px; position: relative; overflow: hidden; transition: border-color .3s, box-shadow .3s; }
    .kpi-card:hover { border-color: var(--accent); box-shadow: var(--shadow-glow); }
    .kpi-card::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
    .kpi-card .label { font-size: 12px; color: var(--text-label); letter-spacing: 1px; }
    .kpi-card .value { font-size: 28px; font-weight: 700; color: #fff; }
    .kpi-card .sub   { font-size: 12px; color: var(--text-muted); }
    .kpi-card .icon  { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 36px; opacity: .12; }
    .chart-row { display: grid; gap: 16px; }
    .chart-row.two { grid-template-columns: 1fr 1fr; }
    .chart-row.three { grid-template-columns: 2fr 1fr 1fr; }
    .chart-row.four { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; display: flex; flex-direction: column; }
    .panel-title { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; padding-left: 10px; border-left: 3px solid var(--accent); }
    .chart-box { flex: 1; min-height: 0; min-height: 280px; }
    footer { text-align: center; padding: 10px; font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
  </style>
</head>
<body>
<header>
  <h1>销售数据大屏</h1>
  <div class="update-time" id="clock"></div>
</header>
<main>
  <div class="kpi-row" id="kpi-row"></div>
  <div class="chart-row two" id="chart-row-1">
    <div class="panel"><div class="panel-title">区域销售分布</div><div class="chart-box" id="chart-1"></div></div>
    <div class="panel"><div class="panel-title">产品利润率排行</div><div class="chart-box" id="chart-2"></div></div>
  </div>
  <div class="chart-row three" id="chart-row-2">
    <div class="panel"><div class="panel-title">月度销售趋势</div><div class="chart-box" id="chart-3"></div></div>
    <div class="panel"><div class="panel-title">利润率分布</div><div class="chart-box" id="chart-4"></div></div>
    <div class="panel"><div class="panel-title">区域利润率对比</div><div class="chart-box" id="chart-5"></div></div>
  </div>
</main>
<footer>Generated by Dashboard Generator · 销售数据分析</footer>

<script>
const DATA = [{"id": 5, "product_name": "机械键盘 Z系列", "region": "华北", "sales_amount": 12600.0, "profit_rate": 15.2, "report_date": "2025-10-10"}, {"id": 6, "product_name": "4K 扩展坞", "region": "华中", "sales_amount": 8400.0, "profit_rate": 12.5, "report_date": "2025-10-12"}, {"id": 7, "product_name": "便携显示屏 15寸", "region": "西南", "sales_amount": 15600.0, "profit_rate": 14.0, "report_date": "2025-10-15"}, {"id": 8, "product_name": "电竞鼠标 G3", "region": "西北", "sales_amount": 9200.0, "profit_rate": 11.5, "report_date": "2025-10-18"}, {"id": 9, "product_name": "智能手表 Pro", "region": "华南", "sales_amount": 31200.0, "profit_rate": 24.1, "report_date": "2025-11-01"}, {"id": 10, "product_name": "无线降噪耳机", "region": "华东", "sales_amount": 22400.0, "profit_rate": 19.5, "report_date": "2025-11-05"}, {"id": 11, "product_name": "机械键盘 Z系列", "region": "华南", "sales_amount": 11000.0, "profit_rate": 14.8, "report_date": "2025-11-08"}, {"id": 12, "product_name": "4K 扩展坞", "region": "西北", "sales_amount": 7600.0, "profit_rate": 10.2, "report_date": "2025-11-12"}, {"id": 13, "product_name": "便携显示屏 15寸", "region": "华北", "sales_amount": 16800.0, "profit_rate": 16.0, "report_date": "2025-11-15"}, {"id": 14, "product_name": "垂直办公鼠标", "region": "华东", "sales_amount": 5400.0, "profit_rate": 25.0, "report_date": "2025-11-20"}, {"id": 3, "product_name": "智能手表 Pro", "region": "华东", "sales_amount": 28500.0, "profit_rate": 22.5, "report_date": "2026-01-01"}, {"id": 4, "product_name": "无线降噪耳机", "region": "华南", "sales_amount": 19800.0, "profit_rate": 18.0, "report_date": "2026-02-05"}, {"id": 2, "product_name": "无线耳机", "region": "华南", "sales_amount": 17955.0, "profit_rate": 12.0, "report_date": "2026-02-10"}, {"id": 1, "product_name": "智能手表", "region": "华东", "sales_amount": 19485.0, "profit_rate": 15.5, "report_date": "2026-03-01"}];

const CONFIG = {
  kpi: [
    { label: "总销售额", field: "sales_amount", aggregate: "sum", formatter: v => "¥" + v.toLocaleString("zh-CN", {minimumFractionDigits: 0, maximumFractionDigits: 0}), icon: "💰" },
    { label: "平均利润率", field: "profit_rate", aggregate: "avg", formatter: v => v.toFixed(1) + "%", icon: "📊" },
    { label: "销售记录", field: "sales_amount", aggregate: "count", icon: "📋" },
    { label: "最高利润率", field: "profit_rate", aggregate: "max", formatter: v => v.toFixed(1) + "%", icon: "🚀" }
  ],
  charts: [
    { id: "chart-1", type: "pie", nameField: "region", valueField: "sales_amount" },
    { id: "chart-2", type: "bar-h", yField: "product_name", xField: "profit_rate" },
    { id: "chart-3", type: "line", xField: "report_date", yField: "sales_amount" },
    { id: "chart-4", type: "bar", xField: "product_name", yField: "profit_rate" },
    { id: "chart-5", type: "bar-group", xField: "region", yField: "profit_rate" }
  ]
};

function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN'); }
updateClock(); setInterval(updateClock, 1000);

(function initDashboard() {
  renderKPI(DATA, CONFIG.kpi);
  renderChart1();  // 区域饼图
  renderChart2();  // 产品利润率柱状图
  renderChart3();  // 月度趋势折线图
  renderChart4();  // 利润率分布
  renderChart5();  // 区域利润率对比
  window.addEventListener('resize', () => {
    ['chart-1','chart-2','chart-3','chart-4','chart-5'].forEach(id => {
      const ec = echarts.getInstanceByDom(document.getElementById(id));
      if (ec) ec.resize();
    });
  });
})();

function renderKPI(data, kpiConfig) {
  const row = document.getElementById('kpi-row');
  row.innerHTML = kpiConfig.map(k => {
    const vals = data.map(r => r[k.field]).filter(v => v != null);
    const total = vals.reduce((a,b)=>a+b,0);
    const avg   = total / vals.length;
    const max   = Math.max(...vals);
    const count = data.length;
    const val   = k.aggregate === 'sum' ? total : k.aggregate === 'avg' ? avg : k.aggregate === 'max' ? max : count;
    return `<div class="kpi-card">
      <div class="label">${k.label}</div>
      <div class="value">${k.formatter ? k.formatter(val) : val}</div>
      ${k.icon ? `<div class="icon">${k.icon}</div>` : ''}
    </div>`;
  }).join('');
}

// 区域销售分布饼图
function renderChart1() {
  const ec = echarts.init(document.getElementById('chart-1'));
  const regionMap = {};
  DATA.forEach(r => { regionMap[r.region] = (regionMap[r.region] || 0) + r.sales_amount; });
  const data = Object.entries(regionMap).map(([name, value]) => ({ name, value }));
  ec.setOption({
    tooltip: { trigger: 'item', formatter: p => `${p.name}<br/>¥${p.value.toLocaleString()}<br/>占比：${p.percent}%`, backgroundColor: 'rgba(0,20,60,.92)', borderColor: 'rgba(0,168,255,.4)', textStyle: { color: '#c8daf5' } },
    legend: { orient: 'vertical', right: 10, top: 'middle', textStyle: { color: '#5a8fc0', fontSize: 11 }, itemWidth: 10, itemHeight: 10 },
    series: [{ type: 'pie', radius: ['38%', '68%'], center: ['40%', '50%'], data, color: ['#00c8ff','#0080ff','#00e0a0','#ff9020','#ff4060','#a040ff','#40e0d0'], label: { show: false }, itemStyle: { borderRadius: 4, borderColor: '#040d1f', borderWidth: 2 }, emphasis: { scale: true, scaleSize: 8 } }]
  });
}

// 产品利润率横向柱状图
function renderChart2() {
  const ec = echarts.init(document.getElementById('chart-2'));
  const prodMap = {};
  DATA.forEach(r => { if (!prodMap[r.product_name] || prodMap[r.product_name] < r.profit_rate) prodMap[r.product_name] = r.profit_rate; });
  const sorted = Object.entries(prodMap).sort((a, b) => b[1] - a[1]);
  ec.setOption({
    tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>利润率：${p[0].value}%`, backgroundColor: 'rgba(0,20,60,.92)', borderColor: 'rgba(0,168,255,.4)', textStyle: { color: '#c8daf5' } },
    grid: { top: 10, right: 30, bottom: 10, left: 120 },
    xAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(0,168,255,.08)' } }, axisLabel: { color: '#5a8fc0', fontSize: 11 } },
    yAxis: { type: 'category', data: sorted.map(s => s[0]), axisLine: { lineStyle: { color: 'rgba(0,168,255,.2)' } }, axisTick: { show: false }, axisLabel: { color: '#5a8fc0', fontSize: 10 } },
    series: [{ type: 'bar', data: sorted.map(s => s[1]), barMaxWidth: 16, itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0, colorStops: [{ offset: 0, color: 'rgba(0,100,200,.6)' }, { offset: 1, color: '#00c8ff' }] }, borderRadius: [0, 4, 4, 0] }, label: { show: true, position: 'right', formatter: '{c}%', color: '#5a8fc0', fontSize: 10 } }]
  });
}

// 月度销售趋势
function renderChart3() {
  const ec = echarts.init(document.getElementById('chart-3'));
  const dateMap = {};
  DATA.forEach(r => { const m = r.report_date.substring(0, 7); dateMap[m] = (dateMap[m] || 0) + r.sales_amount; });
  const sorted = Object.entries(dateMap).sort();
  ec.setOption({
    tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>销售额：¥${p[0].value.toLocaleString()}`, backgroundColor: 'rgba(0,20,60,.92)', borderColor: 'rgba(0,168,255,.4)', textStyle: { color: '#c8daf5' } },
    grid: { top: 20, right: 20, bottom: 30, left: 60 },
    xAxis: { type: 'category', data: sorted.map(s => s[0]), axisLine: { lineStyle: { color: 'rgba(0,168,255,.2)' } }, axisTick: { show: false }, axisLabel: { color: '#5a8fc0', fontSize: 11, rotate: 0 } },
    yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(0,168,255,.08)' } }, axisLabel: { color: '#5a8fc0', fontSize: 11 } },
    series: [{ type: 'line', data: sorted.map(s => s[1]), smooth: true, symbol: 'circle', symbolSize: 8, itemStyle: { color: '#00c8ff' }, lineStyle: { color: '#00c8ff', width: 2 }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(0,200,255,.35)' }, { offset: 1, color: 'rgba(0,200,255,.02)' }] } } }]
  });
}

// 利润率分布柱状图
function renderChart4() {
  const ec = echarts.init(document.getElementById('chart-4'));
  const prodAvg = {};
  DATA.forEach(r => { prodAvg[r.product_name] = prodAvg[r.product_name] ? (prodAvg[r.product_name] + r.profit_rate) / 2 : r.profit_rate; });
  const sorted = Object.entries(prodAvg).sort((a, b) => b[1] - a[1]);
  ec.setOption({
    tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>利润率：${p[0].value}%`, backgroundColor: 'rgba(0,20,60,.92)', borderColor: 'rgba(0,168,255,.4)', textStyle: { color: '#c8daf5' } },
    grid: { top: 20, right: 20, bottom: 50, left: 50 },
    xAxis: { type: 'category', data: sorted.map(s => s[0]), axisLine: { lineStyle: { color: 'rgba(0,168,255,.2)' } }, axisTick: { show: false }, axisLabel: { color: '#5a8fc0', fontSize: 10, rotate: 30 } },
    yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(0,168,255,.08)' } }, axisLabel: { color: '#5a8fc0', fontSize: 11, formatter: '{value}%' } },
    series: [{ type: 'bar', data: sorted.map(s => s[1]), barMaxWidth: 25, itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#00c8ff' }, { offset: 1, color: 'rgba(0,80,200,.4)' }] }, borderRadius: [4, 4, 0, 0] } }]
  });
}

// 区域利润率对比
function renderChart5() {
  const ec = echarts.init(document.getElementById('chart-5'));
  const regionAvg = {};
  const regionCount = {};
  DATA.forEach(r => { regionAvg[r.region] = (regionAvg[r.region] || 0) + r.profit_rate; regionCount[r.region] = (regionCount[r.region] || 0) + 1; });
  Object.keys(regionAvg).forEach(k => regionAvg[k] = regionAvg[k] / regionCount[k]);
  const sorted = Object.entries(regionAvg).sort((a, b) => b[1] - a[1]);
  ec.setOption({
    tooltip: { trigger: 'axis', formatter: p => `${p[0].axisValue}<br/>平均利润率：${p[0].value}%`, backgroundColor: 'rgba(0,20,60,.92)', borderColor: 'rgba(0,168,255,.4)', textStyle: { color: '#c8daf5' } },
    grid: { top: 20, right: 20, bottom: 30, left: 50 },
    xAxis: { type: 'category', data: sorted.map(s => s[0]), axisLine: { lineStyle: { color: 'rgba(0,168,255,.2)' } }, axisTick: { show: false }, axisLabel: { color: '#5a8fc0', fontSize: 11 } },
    yAxis: { type: 'value', axisLine: { show: false }, splitLine: { lineStyle: { color: 'rgba(0,168,255,.08)' } }, axisLabel: { color: '#5a8fc0', fontSize: 11, formatter: '{value}%' } },
    series: [{ type: 'bar', data: sorted.map(s => s[1]), barMaxWidth: 40, itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#00e0a0' }, { offset: 1, color: 'rgba(0,160,80,.4)' }] }, borderRadius: [4, 4, 0, 0] }, label: { show: true, position: 'top', formatter: '{c}%', color: '#00e0a0', fontSize: 11 } }]
  });
}
</script>
</body>
</html>
